services:
  redis:
    image: redis:alpine
    container_name: swiftlet_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - swiflethome-network

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - swiflethome-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - swiflethome-network

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto_broker
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
      - ./tools/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - swiflethome-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./tools/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - swiflethome-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - swiflethome-network

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    # Jenkins cần quyền chạy yarn, build, access thư mục Mount ( Ko set mặc định dùng user 'jenkins')
    user: root
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - jenkins_data:/var/jenkins_home
      # cho phép Jenskin trong container có thể điều kiển chính Docker chứa nó
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount thư mục nguồn với thư mục bên trong jenskin, build code và ghi đè mã nguồn được build vào thư mục nguồn
      - /var/www/SwifletHome:/var/www/SwifletHome
    networks:
      - swiflethome-network

  yenhome-landing-page:
    image: giangdev196/yenhome-landing:latest
    container_name: yenhome_landing
    restart: unless-stopped
    ports:
      - "8081:80"
    networks:
      - swiflethome-network

networks:
  swiflethome-network:
    driver: bridge

volumes:
  mosquitto_data:
    driver: local
  mosquitto_log:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  jenkins_data:
    driver: local
